name: Tourism ML Pipeline

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.9"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install xgboost imbalanced-learn

    # ADDED (safe sanity check)
    - name: Basic import test
      run: |
        python -c "import pandas, sklearn, joblib; print('Imports OK')"

    - name: Run Training Script
      run: python train.py

    - name: Verify model file exists
      run: |
        echo "Checking model file..."
        ls -l
        test -f model.pkl && echo "MODEL EXISTS" || (echo "MODEL MISSING" && exit 1)

    # ADDED (Docker validation for deployment)
    - name: Build Docker Image
      run: docker build -t tourism-app .

    - name: Upload model to Hugging Face
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: python upload_model.py
